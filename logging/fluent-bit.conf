cat > logging/fluent-bit.conf << 'EOF'
[SERVICE]
    Flush         5
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf

[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    Tag               docker.*
    Refresh_Interval  5
    Mem_Buf_Limit     5MB

[FILTER]
    Name    grep
    Match   docker.*
    Regex   $kubernetes['container_name'] nginx|app

[FILTER]
    Name         parser
    Match        docker.*
    Key_Name     log
    Parser       nginx
    Reserve_Data true

[OUTPUT]
    Name          loki
    Match         *
    Host          loki
    Port          3100
    Labels        job=fluent-bit, container=$docker['container_name']
    Label_Keys    $status,$method,$path
    Line_Format   json
EOF
